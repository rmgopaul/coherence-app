<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- Phase E (2026-04-28) — PWA install + offline shell. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#E8432A" />
    <!-- Phase 1.1 of the dashboard foundation repair (2026-04-30) —
         build-id meta tag for the SW build-id mismatch detector
         (see client/public/service-worker.js v3). Replaced at build
         time by the buildIdPlugin in vite.config.ts; "dev" in dev. -->
    <meta name="build-id" content="%VITE_BUILD_ID%" />
    <!-- mobile-web-app-capable is the modern equivalent of the
         apple-prefixed tag below. Both are kept because Safari
         still reads the apple-prefixed one and Chrome warns when
         the unprefixed one is missing. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Coherence" />
    <title>%VITE_APP_TITLE%</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Space+Grotesk:wght@400;500;600;700&family=Archivo+Black&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
